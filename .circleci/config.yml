version: 2.1
jobs:
  create-db:
    docker:
      - image: ghcr.io/oras-project/oras:v1.2.2
    environment:
      REGISTRY_URL: library/ruby
    steps:
      - setup_remote_docker
      - run:
          name: "Download Trivy DB"
          command: |
            mkdir -p trivy-db/db
            oras pull ghcr.io/aquasecurity/trivy-db:2
            tar -xvf db.tar.gz -C trivy-db/db
      - persist_to_workspace:
          root: trivy-db
          paths:
            - "."
  trivy-check:
    parameters:
      ruby_version:
        type: string
      node_major:
        type: string
    docker:
      - image: harbor.k8s.libraries.psu.edu/library/ci-utils:v4.6.1
    environment:
      REGISTRY_URL: library/ruby
      TRIVY_CACHE_DIR: trivy-db
      DOCKER_REGISTRY: 'harbor.k8s.libraries.psu.edu'
    steps:
      - setup_remote_docker
      - checkout
      - attach_workspace:
          at: trivy-db
      - run:
          name: "trivy"
          command: |
            export BUILD_ARGS="--build-arg RUBY_VERSION=<< parameters.ruby_version >> --build-arg NODE_MAJOR=<< parameters.node_major >>"
            export REGISTRY_IMAGE=$REGISTRY_URL-<< parameters.ruby_version >>-node-<< parameters.node_major >>
            export IMAGE_TAG="$(date +%Y%m%d),latest"
            /usr/local/bin/trivy-check
  build-and-push:
    parameters:
      ruby_version:
        type: string
      node_major:
        type: string
    docker:
      - image: harbor.k8s.libraries.psu.edu/library/ci-utils:$CI_UTILS_IMAGE_TAG
    environment:
      REGISTRY_URL: library/ruby
      DOCKER_REGISTRY: 'harbor.k8s.libraries.psu.edu'
    steps:
      - setup_remote_docker
      - checkout
      - run:
          name: "build and push"
          command: |
            export BUILD_ARGS="--build-arg RUBY_VERSION=<< parameters.ruby_version >> --build-arg NODE_MAJOR=<< parameters.node_major >>"
            export REGISTRY_IMAGE=$REGISTRY_URL-<< parameters.ruby_version >>-node-<< parameters.node_major >>
            export IMAGE_TAG="$(date +%Y%m%d),latest"
            /usr/local/bin/build-and-push
workflows:
  trivy_check:
    jobs:
      - create-db:
          context: org-global
      - trivy-check:
          requires:
            - "create-db"
          context: org-global
          matrix:
            parameters:
              node_major: ['22']
              ruby_version: ['3.4.9']
          filters:
            branches:
              only:
                - master
                - /preview\/.*/
  build_and_push:
    jobs:
      - build-and-push:
          context: org-global
          matrix:
            parameters:
              node_major: ['22']
              ruby_version: ['3.4.9']
          filters:
            branches:
              only:
                - master
                - /preview\/.*/
